<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Regalo</title>
    <link rel="stylesheet" href="regalo.css" />
</head>
<body>
    <main class="gift-page">
        <section class="collage-shell">
            <div class="collage-header">
                <p class="eyebrow">Un pequeño recuerdo</p>
                <h1>Collage de fotos</h1>
            </div>

            <div class="collage-grid">
                <article class="photo-card card-1">
                    <div class="photo-frame">
                        <img src="img/WhatsApp Image 2026-07-15 at 10.48.04 AM.jpeg" alt="Foto 1" />
                    </div>
                </article>

                <article class="photo-card card-2">
                    <div class="photo-frame">
                        <img src="img/WhatsApp Image 2026-07-15 at 10.51.56 AM.jpeg" alt="Foto 2" />
                    </div>
                </article>

                <article class="photo-card card-3">
                    <div class="photo-frame">
                        <img src="img/WhatsApp Image 2026-07-15 at 10.51.57 AM.jpeg" alt="Foto 3" />
                    </div>
                </article>

                <article class="photo-card card-4">
                    <div class="photo-frame">
                        <img src="img/WhatsApp Image 2026-07-15 at 10.54.29 AM.jpeg" alt="Foto 4" />
                    </div>
                </article>

                <article class="photo-card card-5">
                    <div class="photo-frame">
                        <img src="img/WhatsApp Image 2026-07-15 at 10.54.29 AM (1).jpeg" alt="Foto 5" />
                    </div>
                </article>

                <article class="photo-card card-6">
                    <div class="photo-frame">
                        <img src="img/Dola.png" alt="Foto 6" />
                    </div>
                </article>
            </div>
        </section>
    </main>
</body>
</html>
