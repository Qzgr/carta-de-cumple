<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Regalo</title>
    <link rel="stylesheet" href="regalo.css" />
</head>
<body>
    <main class="gift-page">
        <section class="collage-shell">
            <div class="collage-header">
                <p class="eyebrow">Un pequeño recuerdo</p>
                <h1>Collage de fotos</h1>
            </div>

            <div class="collage-grid">
                <article class="photo-card card-1">
                    <div class="photo-frame">
                        <img src="https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?auto=format&fit=crop&w=900&q=80" alt="Foto 1" />
                    </div>
                </article>

                <article class="photo-card card-2">
                    <div class="photo-frame">
                        <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?auto=format&fit=crop&w=900&q=80" alt="Foto 2" />
                    </div>
                </article>

                <article class="photo-card card-3">
                    <div class="photo-frame">
                        <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&w=900&q=80" alt="Foto 3" />
                    </div>
                </article>

                <article class="photo-card card-4">
                    <div class="photo-frame">
                        <img src="https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=900&q=80" alt="Foto 4" />
                    </div>
                </article>

                <article class="photo-card card-5">
                    <div class="photo-frame">
                        <img src="https://images.unsplash.com/photo-1521119989659-a83eee488004?auto=format&fit=crop&w=900&q=80" alt="Foto 5" />
                    </div>
                </article>

                <article class="photo-card card-6">
                    <div class="photo-frame">
                        <img src="https://images.unsplash.com/photo-1500530855697-b586d89ba3ee?auto=format&fit=crop&w=900&q=80" alt="Foto 6" />
                    </div>
                </article>
            </div>
        </section>
    </main>
</body>
</html>
